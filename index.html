<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>班级日常记录 · 数据安全版</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f0f4f9;
      font-family: system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      padding: 16px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }
    .container {
      width: 100%;
      max-width: 1000px;
      background: white;
      border-radius: 32px;
      box-shadow: 0 20px 35px rgba(0,0,0,0.05);
      padding: 22px 20px 28px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    h1 { font-size: 1.8rem; font-weight: 650; color: #1e293b; border-bottom: 2px solid #e9eef3; padding-bottom: 14px; display: flex; align-items: center; gap: 10px; }
    h1 span { background: #e9f0fa; padding: 4px 16px; border-radius: 40px; font-size: 0.9rem; color: #1d4b78; }

    .backup-bar { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; background: #e8f5e9; padding: 10px 16px; border-radius: 16px; font-size: 0.85rem; }
    #saveStatus { font-weight: 600; transition: color 0.3s; }

    .tab-nav { display: flex; flex-wrap: wrap; gap: 8px; background: #f8fafd; padding: 6px; border-radius: 20px; }
    .tab-btn { padding: 10px 20px; border-radius: 18px; font-weight: 600; font-size: 0.9rem; cursor: pointer; border: none; background: transparent; color: #5b728b; }
    .tab-btn.active { background: #154a6b; color: white; }
    .tab-content { display: none; }
    .tab-content.active { display: flex; flex-direction: column; gap: 18px; }

    .btn { padding: 8px 18px; border-radius: 24px; font-weight: 600; font-size: 0.85rem; cursor: pointer; border: none; display: flex; align-items: center; gap: 5px; white-space: nowrap; }
    .btn-primary { background: #154a6b; color: white; }
    .btn-outline { background: white; border: 1px solid #b8cee7; color: #1d466a; }
    .btn-success { background: #1e5d2c; color: white; }
    .btn-warning { background: #f5a623; color: white; }
    .btn-danger { background: #fff5f5; border: 1px solid #f5c6c6; color: #a12b2b; }
    .btn-sm { padding: 5px 14px; font-size: 0.78rem; }
    .btn-xs { padding: 3px 10px; font-size: 0.7rem; }

    .student-panel { background:#fafcff; border:1px solid #dce6f3; border-radius:20px; padding:16px; display:flex; flex-direction:column; gap:12px; }
    .student-panel summary { font-weight:700; font-size:1rem; color:#1e3b5c; cursor:pointer; display:flex; align-items:center; gap:8px; }
    .count-badge { background:#e2ebf6; padding:2px 12px; border-radius:14px; font-size:0.8rem; font-weight:600; }
    .batch-area { display:flex; flex-direction:column; gap:8px; }
    .batch-textarea { width:100%; min-height:80px; border:1px solid #cdd9e9; border-radius:16px; padding:12px; font-size:0.9rem; resize:vertical; background:#fbfdff; }
    .batch-btns { display:flex; flex-wrap:wrap; gap:8px; }
    .student-tags { display:flex; flex-wrap:wrap; gap:6px; max-height:140px; overflow-y:auto; }
    .student-tag { background:#eef3fa; padding:4px 12px; border-radius:16px; font-size:0.82rem; display:flex; align-items:center; gap:4px; }
    .student-tag .remove-tag { cursor:pointer; font-weight:bold; color:#8899b0; }
    .student-tag .remove-tag:hover { color:#c44; }
    .toolbar { display:flex; flex-wrap:wrap; align-items:center; gap:12px; background:#f8fafd; padding:14px 16px; border-radius:20px; }
    .date-input { border:1px solid #cdd9e9; border-radius:30px; padding:9px 16px; background:white; }
    .record-panel { background:#fff; border:1px solid #e9f0f5; border-radius:24px; padding:16px; display:flex; flex-direction:column; gap:14px; }
    .student-multi-select { background:#f7fafd; border:1px solid #dce3eb; border-radius:16px; padding:12px; }
    .select-header { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:6px; }
    .student-checkboxes { display:flex; flex-wrap:wrap; gap:6px 10px; max-height:160px; overflow-y:auto; }
    .student-checkboxes label { display:flex; align-items:center; gap:4px; font-size:0.88rem; cursor:pointer; padding:4px 10px; border-radius:16px; background:white; border:1px solid #e0e7ef; }
    .student-checkboxes label:has(input:checked) { background:#dce8fd; border-color:#8aa9d6; font-weight:600; }
    .checkbox-group { display:flex; flex-wrap:wrap; gap:10px; background:#f7fafd; padding:8px 14px; border-radius:20px; }
    .checkbox-group label { display:flex; align-items:center; gap:5px; font-size:0.9rem; cursor:pointer; }
    .note-input { flex:1; min-width:200px; padding:10px 14px; border-radius:20px; border:1px solid #dce3eb; }
    .records-list { background:#f9fcff; border-radius:20px; padding:8px; max-height:250px; overflow-y:auto; }
    .record-item { display:flex; justify-content:space-between; background:white; margin:6px 4px; padding:12px; border-radius:18px; border:1px solid #e6edf6; align-items:center; flex-wrap:wrap; gap:8px; }
    .badge { padding:4px 12px; border-radius:18px; font-size:0.75rem; font-weight:700; }
    .badge.leave { background:#ffe8db; color:#b1531c; }
    .badge.absent { background:#fde2e2; color:#a12b2b; }
    .badge.meal-stop { background:#f1e5d2; color:#7b4e1d; }
    .badge.meal-missed { background:#fce4c8; color:#a1581c; }
    .delete-btn { background:none; border:none; color:#7f8c9a; font-size:1.2rem; cursor:pointer; }
    .delete-btn:hover { color:#c44; }

    .draft-panel { background:#fffdf5; border:2px dashed #f0d060; border-radius:20px; padding:14px; display:flex; flex-direction:column; gap:10px; }
    .draft-panel h4 { color:#8b6914; font-size:0.95rem; display:flex; align-items:center; gap:6px; }
    .draft-item { display:flex; justify-content:space-between; align-items:center; background:#fffef9; padding:8px 12px; border-radius:14px; border:1px solid #f0e4b8; font-size:0.85rem; }
    .draft-count { background:#f5a623; color:white; padding:2px 10px; border-radius:12px; font-size:0.75rem; font-weight:700; }

    .filter-panel { background:#f7fafd; border:1px solid #dce3eb; border-radius:20px; padding:14px; display:flex; flex-direction:column; gap:10px; }
    .io-panel { background:#fafcff; border:1px solid #dce6f3; border-radius:20px; padding:16px; display:flex; flex-direction:column; gap:10px; }
    .io-panel summary { font-weight:700; font-size:1rem; color:#1e3b5c; cursor:pointer; }
    .io-section { background:#f7fafd; border-radius:16px; padding:14px; display:flex; flex-direction:column; gap:8px; }
    .io-row { display:flex; flex-wrap:wrap; align-items:center; gap:10px; }
    .file-label { background:#eef3ff; padding:8px 18px; border-radius:30px; font-size:0.85rem; font-weight:600; color:#1e4682; cursor:pointer; border:1px dashed #8aa9d6; display:flex; align-items:center; gap:4px; }

    .export-area { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; }
    .export-btns { display:flex; flex-wrap:wrap; gap:8px; }
    .export-select { padding:8px 14px; border-radius:24px; border:1px solid #b8cee7; }
    .empty-message { color:#8499b4; text-align:center; padding:28px; }

    .assessment-panel { background:#fafcff; border:1px solid #dce6f3; border-radius:20px; padding:16px; display:flex; flex-direction:column; gap:14px; }
    .assessment-header { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; }
    .period-select { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
    .period-select select, .period-select input { padding:8px 14px; border-radius:20px; border:1px solid #cdd9e9; }
    .assessment-legend { display:flex; flex-wrap:wrap; gap:12px; font-size:0.78rem; background:#f7fafd; padding:10px 14px; border-radius:14px; }
    .legend-dot { width:12px; height:12px; border-radius:50%; display:inline-block; }
    .legend-dot.A{background:#4caf50;} .legend-dot.B{background:#2196F3;} .legend-dot.C{background:#ff9800;} .legend-dot.D{background:#f44336;}
    .assessment-table-wrap { overflow-x:auto; border-radius:16px; border:1px solid #e6edf6; }
    .assessment-table { width:100%; border-collapse:collapse; font-size:0.8rem; min-width:1100px; }
    .assessment-table th { background:#eef3fa; padding:10px 6px; text-align:center; font-weight:700; border-bottom:2px solid #dce3eb; }
    .assessment-table td { padding:6px 4px; text-align:center; border-bottom:1px solid #eef2f7; }
    .name-col { font-weight:600; text-align:left; padding-left:10px; }
    .grade-select { padding:3px 2px; border-radius:10px; border:1px solid #dce3eb; font-size:0.75rem; width:56px; }
    .grade-select.A{background:#d4edda;border-color:#8bc49a;color:#1e5d2c;font-weight:700;}
    .grade-select.B{background:#e8f0fe;border-color:#a0c4f0;color:#1d4b78;font-weight:700;}
    .grade-select.C{background:#fff9e6;border-color:#e8d48b;color:#7b5d1e;font-weight:700;}
    .grade-select.D{background:#fde8e8;border-color:#f0a0a0;color:#8b2525;font-weight:700;}
    .total-grade{font-weight:800;font-size:0.9rem;padding:2px 8px;border-radius:12px;}
    .total-grade.A{background:#d4edda;color:#1e5d2c;} .total-grade.B{background:#e8f0fe;color:#1d4b78;}
    .total-grade.C{background:#fff9e6;color:#7b5d1e;} .total-grade.D{background:#fde8e8;color:#8b2525;}

    .toast { position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#1e293b;color:white;padding:12px 24px;border-radius:30px;font-weight:600;z-index:999;animation:toastIn 0.3s ease,toastOut 0.3s ease 2.5s forwards;pointer-events:none; }
    @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-10px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
    @keyframes toastOut{from{opacity:1;}to{opacity:0;}}
  </style>
</head>
<body>
<div class="container">
  <h1>🧑‍🏫 班级日常记录 <span>数据安全版</span></h1>

  <div class="backup-bar">
    <span id="saveStatus">💾 数据已保存</span>
    <span style="margin-left:auto;display:flex;gap:8px;flex-wrap:wrap;">
      <button class="btn btn-sm btn-primary" id="manualSaveBtn" style="background:#e65100;">💾 立即保存</button>
      <button class="btn btn-sm btn-success" id="manualBackupBtn">📥 下载备份</button>
      <label class="btn btn-sm btn-outline" style="cursor:pointer;">📤 恢复备份<input type="file" id="restoreFile" accept=".json" style="display:none;"></label>
    </span>
  </div>

  <div class="tab-nav">
    <button class="tab-btn active" data-tab="daily">📋 日常记录</button>
    <button class="tab-btn" data-tab="assessment">⭐ 素质评定</button>
  </div>

  <div class="tab-content active" id="tab-daily">
    <!-- 数据导入导出面板 -->
    <details class="io-panel">
      <summary>📦 数据导入/导出</summary>
      <div class="io-section">
        <h4>📥 导入CSV记录</h4>
        <p style="font-size:0.78rem;color:#8899b0;">支持导入之前导出的CSV文件（日期,学生,事件类型,重大事项）</p>
        <div class="io-row">
          <label for="importCsvFile" class="file-label">📁 选择CSV文件</label>
          <input type="file" id="importCsvFile" accept=".csv,.txt" style="display:none;">
          <span id="importCsvStatus" style="font-size:0.8rem;color:#8899b0;"></span>
        </div>
      </div>
      <div class="io-section">
        <h4>📤 快速导出</h4>
        <div class="io-row">
          <select id="exportTypeSelect" class="export-select">
            <option value="全部">📦 全部记录</option>
            <option value="请假">📅 仅请假</option>
            <option value="未上第7节托管">⏱️ 仅缺第7节</option>
            <option value="未上第8节托管">⏱️ 仅缺第8节</option>
            <option value="已停餐">🍽️ 仅已停餐</option>
            <option value="未停餐">✅ 仅未停餐</option>
            <option value="补停餐">🔄 仅补停餐</option>
            <option value="停餐类">🍽️ 停餐类（全部）</option>
            <option value="托管类">⏱️ 托管类（第7+8节）</option>
            <option value="重大事件">📝 重大事件（有备注的）</option>
          </select>
          <button class="btn btn-primary" id="exportByTypeBtn">📤 导出CSV</button>
        </div>
      </div>
    </details>

    <details class="student-panel">
      <summary>👥 学生名单 <span class="count-badge" id="panelStudentCount">0人</span></summary>
      <div class="batch-area">
        <textarea id="batchInput" class="batch-textarea" placeholder="粘贴学生姓名，换行/逗号/顿号/空格分隔"></textarea>
        <div class="batch-btns">
          <button class="btn btn-primary" id="batchAddBtn">➕ 批量添加</button>
          <button class="btn btn-outline" id="batchReplaceBtn">🔄 替换全部</button>
          <button class="btn btn-outline" id="exportStudentBtn">📤 导出名单</button>
          <button class="btn btn-danger" id="clearStudentBtn">🗑️ 清空</button>
        </div>
      </div>
      <div style="display:flex;gap:8px;">
        <input type="text" id="singleStudentInput" placeholder="单个学生姓名" style="flex:1;padding:10px;border-radius:20px;border:1px solid #cdd9e9;">
        <button class="btn btn-outline" id="addSingleBtn">➕ 添加</button>
      </div>
      <div class="student-tags" id="studentTags"></div>
    </details>

    <div class="toolbar">
      <label>📅 日期</label>
      <input type="date" id="recordDate" class="date-input">
    </div>

    <div class="draft-panel" id="draftPanel">
      <h4>📝 草稿暂存区 <span class="draft-count" id="draftCount">0条</span></h4>
      <div id="draftList" style="display:flex;flex-direction:column;gap:6px;">
        <span style="color:#8899b0;font-size:0.85rem;">暂无草稿</span>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn btn-warning btn-sm" id="saveDraftBtn">📥 暂存当前选择</button>
        <button class="btn btn-success btn-sm" id="submitAllDraftsBtn">✅ 一键提交全部草稿</button>
        <button class="btn btn-danger btn-sm" id="clearDraftsBtn">🗑️ 清空草稿</button>
      </div>
    </div>

    <div class="record-panel">
      <div class="student-multi-select">
        <div class="select-header">
          <strong>👤 选择学生（可多选，提交后不清空）</strong>
          <div style="display:flex;gap:6px;">
            <button class="btn btn-sm btn-outline" id="selectAllStudents">全选</button>
            <button class="btn btn-sm btn-outline" id="deselectAllStudents">取消全选</button>
          </div>
        </div>
        <div class="student-checkboxes" id="studentCheckboxes"></div>
      </div>
      <div class="checkbox-group">
        <strong>📌 事件类型</strong>
        <label><input type="checkbox" class="type-check" value="请假"> 请假</label>
        <label><input type="checkbox" class="type-check" value="未上第7节托管"> 缺第7节</label>
        <label><input type="checkbox" class="type-check" value="未上第8节托管"> 缺第8节</label>
        <label><input type="checkbox" class="type-check" value="已停餐"> 已停餐</label>
        <label><input type="checkbox" class="type-check" value="未停餐"> 未停餐</label>
        <label><input type="checkbox" class="type-check" value="补停餐"> 补停餐</label>
      </div>
      <button class="btn btn-primary" id="addRecordBtn">➕ 直接提交</button>
      <div style="display:flex;gap:8px;align-items:center;">
        <label>📝 重大事项</label>
        <input type="text" id="noteInput" class="note-input" placeholder="今天发生的重要事情...">
      </div>
    </div>

    <div>
      <div style="display:flex;justify-content:space-between;">
        <h3>📌 今日记录</h3>
        <span id="recordCount" style="background:#e3ecf5;padding:4px 16px;border-radius:20px;">0条</span>
      </div>
      <div class="records-list" id="recordsContainer"></div>
    </div>

    <div class="filter-panel">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">
        <h4 style="color:#1e3b5c;margin:0;">🔍 历史记录筛选</h4>
        <span id="filteredCount" style="background:#e3ecf5;padding:4px 14px;border-radius:20px;font-size:0.85rem;">0条结果</span>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center;">
        <input type="date" id="filterStartDate" class="date-input" style="padding:6px 12px;font-size:0.85rem;">
        <span>~</span>
        <input type="date" id="filterEndDate" class="date-input" style="padding:6px 12px;font-size:0.85rem;">
        <select id="filterStudent" class="export-select" style="padding:6px 12px;font-size:0.85rem;min-width:120px;">
          <option value="">全部学生</option>
        </select>
        <select id="filterType" class="export-select" style="padding:6px 12px;font-size:0.85rem;min-width:130px;">
          <option value="">全部类型</option>
          <option value="请假">请假</option>
          <option value="未上第7节托管">缺第7节</option>
          <option value="未上第8节托管">缺第8节</option>
          <option value="已停餐">已停餐</option>
          <option value="未停餐">未停餐</option>
          <option value="补停餐">补停餐</option>
          <option value="有备注">有重大事件</option>
        </select>
        <input type="text" id="filterKeyword" placeholder="🔍 关键词搜索" style="padding:6px 12px;border-radius:20px;border:1px solid #cdd9e9;font-size:0.85rem;min-width:130px;">
        <button class="btn btn-sm btn-outline" id="applyFilterBtn">🔍 筛选</button>
        <button class="btn btn-sm btn-outline" id="resetFilterBtn">🔄 重置</button>
        <button class="btn btn-sm btn-primary" id="exportFilteredBtn">📤 导出筛选结果</button>
      </div>
      <div class="records-list" id="filteredRecordsContainer" style="max-height:300px;">
        <div class="empty-message">点击「🔍 筛选」查看历史记录</div>
      </div>
    </div>
  </div>

  <div class="tab-content" id="tab-assessment">
    <div class="assessment-panel">
      <div class="assessment-header">
        <h3>⭐ 小学生综合素质评定</h3>
        <div class="period-select">
          <select id="assessmentPeriod">
            <option value="week">📆 本周</option>
            <option value="month">📅 本月</option>
            <option value="custom">🔧 自定义</option>
          </select>
          <input type="date" id="assessmentStart" style="display:none;">
          <span id="customSep" style="display:none;">~</span>
          <input type="date" id="assessmentEnd" style="display:none;">
          <button class="btn btn-sm btn-outline" id="refreshAssessment">🔄 刷新</button>
        </div>
      </div>
      <div class="assessment-legend">
        <span>📊 等级：</span>
        <span><span class="legend-dot A"></span> A优秀</span>
        <span><span class="legend-dot B"></span> B良好</span>
        <span><span class="legend-dot C"></span> C一般</span>
        <span><span class="legend-dot D"></span> D需努力</span>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn btn-warning" id="autoGradeBtn">🤖 自动评定</button>
        <button class="btn btn-outline" id="resetAllBtn">🔄 重置</button>
        <button class="btn btn-success" id="exportAssessmentBtn">📤 导出评定表</button>
      </div>
      <div class="assessment-table-wrap">
        <table class="assessment-table">
          <thead>
            <tr>
              <th class="name-col" rowspan="2">学生</th>
              <th colspan="2">出勤</th>
              <th colspan="4">学习习惯</th>
              <th colspan="2">作业</th>
              <th colspan="2">书写态度</th>
              <th rowspan="2">综合</th>
            </tr>
            <tr>
              <th>请假</th><th>缺托管</th>
              <th>课堂常规</th><th>积极发言</th><th>课前预习</th><th>课堂作业</th>
              <th>家庭作业</th><th>字迹工整</th><th>学习态度</th>
            </tr>
          </thead>
          <tbody id="assessmentBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  const DIMENSIONS = [
    { key: 'attendance_leave', label: '请假' }, { key: 'attendance_absent', label: '缺托管' },
    { key: 'classroom_discipline', label: '课堂常规' }, { key: 'active_speaking', label: '积极发言' },
    { key: 'preview', label: '课前预习' }, { key: 'classwork', label: '课堂作业' },
    { key: 'homework', label: '家庭作业' }, { key: 'handwriting', label: '字迹工整' },
    { key: 'attitude', label: '学习态度' },
  ];

  let records = [], studentList = [], assessments = {}, drafts = [];
  let currentDate = new Date().toISOString().split('T')[0];
  let hasUnsavedChanges = false;

  function showToast(msg) { const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),3000); }
  const BACKUP_KEY = 'class_app_backup_v6';

  // ============ 保存/加载 ============
  function saveToLocal() {
    const data = { records, studentList, assessments, drafts, savedAt: new Date().toISOString(), version: '2.0' };
    try {
      localStorage.setItem(BACKUP_KEY, JSON.stringify(data));
      hasUnsavedChanges = false;
      const el = document.getElementById('saveStatus');
      if (el) { el.textContent = '✅ 已保存 ' + new Date().toLocaleTimeString(); el.style.color = '#1e5d2c'; setTimeout(() => { if (el) { el.textContent = '💾 数据已保存'; el.style.color = ''; } }, 3000); }
    } catch (e) {
      showToast('⚠️ 保存失败！可能是存储空间不足，请导出备份后清理旧数据');
    }
  }

  function loadFromLocal() {
    const saved = localStorage.getItem(BACKUP_KEY);
    if (saved) {
      try {
        const data = JSON.parse(saved);
        records = data.records || [];
        studentList = data.studentList || [];
        assessments = data.assessments || {};
        drafts = data.drafts || []; // 兼容旧版本没有drafts字段
        return true;
      } catch (e) {
        console.error('数据解析失败:', e);
        return false;
      }
    }
    return false;
  }

  // ============ 备份/恢复 ============
  function downloadBackup(filename = null) {
    saveToLocal();
    const data = { records, studentList, assessments, drafts, savedAt: new Date().toISOString(), version: '2.0' };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename || `班级备份_${new Date().toISOString().slice(0, 10)}.json`;
    a.click();
    showToast('💾 备份文件已下载');
  }

  function restoreBackup(file) {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = JSON.parse(e.target.result);

        // 兼容旧格式：没有drafts字段
        const backupDrafts = data.drafts || [];
        const backupRecords = data.records || [];
        const backupStudents = data.studentList || [];
        const backupAssessments = data.assessments || {};
        const savedAt = data.savedAt || '未知时间';
        const version = data.version || '旧版本';

        // 让用户选择恢复方式
        const choice = confirm(
          `📦 备份信息：\n` +
          `⏰ 时间：${savedAt}\n` +
          `📌 版本：${version}\n` +
          `👥 学生：${backupStudents.length} 人\n` +
          `📋 记录：${backupRecords.length} 条\n` +
          `📝 草稿：${backupDrafts.length} 条\n` +
          `⭐ 评定：${Object.keys(backupAssessments).length} 项\n\n` +
          `点击「确定」覆盖当前数据\n点击「取消」合并到现有数据（不覆盖）`
        );

        if (choice) {
          // 覆盖模式
          records = backupRecords;
          studentList = backupStudents;
          assessments = backupAssessments;
          drafts = backupDrafts;
        } else {
          // 合并模式：追加不重复的记录
          const existingRecordKeys = new Set(records.map(r => `${r.date}|${r.student}|${r.type}`));
          backupRecords.forEach(r => {
            const key = `${r.date}|${r.student}|${r.type}`;
            if (!existingRecordKeys.has(key)) {
              records.push(r);
              existingRecordKeys.add(key);
            }
          });

          // 合并学生名单
          const existingStudents = new Set(studentList);
          backupStudents.forEach(s => { if (!existingStudents.has(s)) { studentList.push(s); existingStudents.add(s); } });

          // 合并评定
          Object.assign(assessments, backupAssessments);

          // 合并草稿
          backupDrafts.forEach(d => drafts.push(d));
        }

        saveToLocal();
        updateAllUI();
        renderTodayUI();
        renderDrafts();
        renderAssessmentTable();
        showToast('✅ 备份恢复成功！');
      } catch (err) {
        alert('❌ 文件格式不正确，无法恢复。请确认选择的是 .json 备份文件。');
      }
    };
    reader.readAsText(file);
  }

  // ============ 导入CSV记录 ============
  function importCSVRecords(file) {
    const reader = new FileReader();
    reader.onload = (e) => {
      const lines = e.target.result.split(/[\n\r]+/).filter(l => l.trim());
      if (lines.length < 2) {
        document.getElementById('importCsvStatus').textContent = '❌ CSV格式不正确';
        return;
      }

      let imported = 0, skipped = 0;
      const existingKeys = new Set(records.map(r => `${r.date}|${r.student}|${r.type}`));

      for (let i = 1; i < lines.length; i++) {
        const parts = [];
        let cur = '', inQ = false;
        for (const ch of lines[i]) {
          if (ch === '"') { inQ = !inQ; continue; }
          if (ch === ',' && !inQ) { parts.push(cur.trim()); cur = ''; continue; }
          cur += ch;
        }
        parts.push(cur.trim());

        const date = parts[0] || '';
        const student = parts[1] || '';
        const type = parts[2] || '';
        const note = parts[3] || '';

        if (!date || !student || !type) continue;
        if (!/^\d{4}-\d{2}-\d{2}$/.test(date)) continue;

        const key = `${date}|${student}|${type}`;
        if (existingKeys.has(key)) { skipped++; continue; }

        records.push({
          id: 'csv_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 8) + imported,
          student, type, date, note: note || '', timestamp: Date.now() + imported
        });
        existingKeys.add(key);
        imported++;

        // 自动添加新学生到名单
        if (!studentList.includes(student)) {
          studentList.push(student);
        }
      }

      saveToLocal();
      updateAllUI();
      renderTodayUI();
      document.getElementById('importCsvStatus').textContent = `✅ 导入 ${imported} 条，跳过 ${skipped} 条重复`;
      showToast(`📥 成功导入 ${imported} 条记录`);
      setTimeout(() => { document.getElementById('importCsvStatus').textContent = ''; }, 5000);
    };
    reader.readAsText(file, 'UTF-8');
  }

  // ============ 自动保存 ============
  window.addEventListener('beforeunload', () => {
    saveToLocal();
    if (records.length > 0 || studentList.length > 0) {
      // 关闭页面前自动下载备份
      try {
        downloadBackup(`班级自动备份_${new Date().toISOString().slice(0, 10)}.json`);
      } catch (e) {}
    }
  });

  setInterval(() => { if (hasUnsavedChanges) saveToLocal(); }, 5000);

  function markChanged() {
    hasUnsavedChanges = true;
    const el = document.getElementById('saveStatus');
    if (el) { el.textContent = '⚠️ 有未保存的修改'; el.style.color = '#e65100'; }
  }

  // ============ 工具函数 ============
  function getMonday(d) { const dt = new Date(d); const day = dt.getDay(); dt.setDate(dt.getDate() - day + (day === 0 ? -6 : 1)); return dt.toISOString().slice(0, 10); }
  function getSunday(d) { const m = new Date(getMonday(d)); m.setDate(m.getDate() + 6); return m.toISOString().slice(0, 10); }
  function getMonthStart(d) { return d.slice(0, 7) + '-01'; }
  function getMonthEnd(d) { const y = parseInt(d.slice(0, 4)), m = parseInt(d.slice(5, 7)); return new Date(y, m, 0).toISOString().slice(0, 10); }
  function getTodayRecords() { return records.filter(r => r.date === currentDate); }
  function getWeekRecords() { return records.filter(r => r.date >= getMonday(currentDate) && r.date <= getSunday(currentDate)); }
  function getAllRecords() { return [...records]; }

  function getAssessmentRange() {
    const p = document.getElementById('assessmentPeriod').value;
    if (p === 'week') return { start: getMonday(currentDate), end: getSunday(currentDate) };
    if (p === 'month') return { start: getMonthStart(currentDate), end: getMonthEnd(currentDate) };
    return { start: document.getElementById('assessmentStart').value, end: document.getElementById('assessmentEnd').value };
  }

  function parseStudentNames(text) {
    return text.replace(/[\n\r]+/g, ',').replace(/、/g, ',').replace(/，/g, ',').replace(/\s+/g, ',').replace(/,+/g, ',')
      .split(',').map(s => s.trim()).filter(s => s.length > 0 && s.length < 30);
  }

  function addStudents(names, replace = false) {
    if (replace) studentList = [];
    const ex = new Set(studentList);
    let a = 0;
    names.forEach(n => { if (!ex.has(n)) { studentList.push(n); ex.add(n); a++; } });
    if (a > 0 || replace) { markChanged(); updateAllUI(); }
    return { added: a, total: studentList.length };
  }

  function removeStudent(name) { studentList = studentList.filter(n => n !== name); markChanged(); updateAllUI(); }
  function clearAllStudents() { if (!studentList.length) return; if (!confirm(`清空 ${studentList.length} 名学生？`)) return; studentList = []; markChanged(); updateAllUI(); }

  function renderStudentCheckboxes() {
    const c = document.getElementById('studentCheckboxes');
    c.innerHTML = '';
    if (!studentList.length) c.innerHTML = '<span style="color:#8899b0;">暂无学生</span>';
    else studentList.forEach(n => { const l = document.createElement('label'); l.innerHTML = `<input type="checkbox" class="student-check" value="${esc(n)}"> ${esc(n)}`; c.appendChild(l); });
  }

  function getSelectedStudents() { return Array.from(document.querySelectorAll('.student-check:checked')).map(cb => cb.value); }
  function getSelectedTypes() { return Array.from(document.querySelectorAll('#tab-daily .type-check')).filter(cb => cb.checked).map(cb => cb.value); }

  function updateFilterStudentList() {
    const s = document.getElementById('filterStudent');
    if (!s) return;
    const cv = s.value;
    s.innerHTML = '<option value="">全部学生</option>';
    studentList.forEach(n => { s.innerHTML += `<option value="${esc(n)}" ${cv === n ? 'selected' : ''}>${esc(n)}</option>`; });
  }

  function updateAllUI() {
    document.getElementById('panelStudentCount').textContent = `${studentList.length}人`;
    const t = document.getElementById('studentTags');
    t.innerHTML = '';
    if (!studentList.length) t.innerHTML = '<span style="color:#8899b0;">暂无学生</span>';
    else studentList.forEach(n => { const tag = document.createElement('span'); tag.className = 'student-tag'; tag.innerHTML = `${esc(n)} <span class="remove-tag">×</span>`; tag.querySelector('.remove-tag').addEventListener('click', () => removeStudent(n)); t.appendChild(tag); });
    renderStudentCheckboxes();
    updateFilterStudentList();
    if (document.getElementById('tab-assessment').classList.contains('active')) renderAssessmentTable();
  }

  // ============ 草稿功能 ============
  function saveDraft() {
    const stu = getSelectedStudents(), ty = getSelectedTypes();
    if (!stu.length) return alert('请选择学生');
    if (!ty.length) return alert('请选择事件类型');
    drafts.push({ students: [...stu], types: [...ty], note: document.getElementById('noteInput').value.trim() });
    markChanged();
    document.querySelectorAll('#tab-daily .type-check').forEach(cb => cb.checked = false);
    document.getElementById('noteInput').value = '';
    renderDrafts();
    showToast(`📥 已暂存（${drafts.length}条）`);
    saveToLocal(); // 立即保存
  }

  function submitAllDrafts() {
    if (!drafts.length) return alert('无草稿');
    if (!confirm(`提交 ${drafts.length} 条草稿到今日记录？`)) return;
    drafts.forEach(d => { d.students.forEach(s => { d.types.forEach(t => { records.push({ id: Date.now().toString(36) + Math.random().toString(36).slice(2, 8), student: s, type: t, date: currentDate, note: d.note, timestamp: Date.now() }); }); }); });
    drafts = [];
    markChanged();
    renderDrafts();
    renderTodayUI();
    saveToLocal();
    showToast('✅ 已提交全部草稿');
  }

  function removeDraft(i) { drafts.splice(i, 1); markChanged(); renderDrafts(); saveToLocal(); }
  function clearDrafts() { if (!drafts.length) return; if (!confirm(`清空 ${drafts.length} 条草稿？`)) return; drafts = []; markChanged(); renderDrafts(); saveToLocal(); }

  function renderDrafts() {
    const c = document.getElementById('draftList');
    document.getElementById('draftCount').textContent = `${drafts.length}条`;
    if (!drafts.length) { c.innerHTML = '<span style="color:#8899b0;font-size:0.85rem;">暂无草稿</span>'; return; }
    c.innerHTML = '';
    drafts.forEach((d, i) => {
      const div = document.createElement('div');
      div.className = 'draft-item';
      div.innerHTML = `<div><strong>${d.students.join('、')}</strong><span style="margin-left:8px;">${d.types.map(t => `<span class="badge" style="margin:2px;">${esc(t)}</span>`).join('')}</span>${d.note ? `<span style="font-size:0.8rem;color:#8b6914;">📌${esc(d.note)}</span>` : ''}</div><button class="btn btn-xs btn-danger">✕</button>`;
      div.querySelector('button').addEventListener('click', () => removeDraft(i));
      c.appendChild(div);
    });
  }

  // ============ 记录管理 ============
  function addRecord() {
    const stu = getSelectedStudents(), ty = getSelectedTypes();
    if (!stu.length) return alert('请选择学生');
    if (!ty.length) return alert('请选择事件类型');
    const note = document.getElementById('noteInput').value.trim();
    stu.forEach(s => { ty.forEach(t => { records.push({ id: Date.now().toString(36) + Math.random().toString(36).slice(2, 8), student: s, type: t, date: currentDate, note, timestamp: Date.now() }); }); });
    markChanged();
    document.querySelectorAll('#tab-daily .type-check').forEach(cb => cb.checked = false);
    document.getElementById('noteInput').value = '';
    renderTodayUI();
    saveToLocal();
    showToast(`✅ ${stu.length}人 × ${ty.length}种`);
  }

  function deleteRecord(rec) { records = records.filter(r => r.id !== rec.id); markChanged(); renderTodayUI(); saveToLocal(); }

  function getTypeClass(t) { if (t.includes('请假')) return 'leave'; if (t.includes('托管')) return 'absent'; if (t === '已停餐') return 'meal-stop'; if (t === '补停餐') return 'meal-missed'; return ''; }

  function renderTodayUI() {
    const today = getTodayRecords(), c = document.getElementById('recordsContainer');
    c.innerHTML = '';
    if (!today.length) c.innerHTML = '<div class="empty-message">📭 今天暂无记录</div>';
    else [...today].sort((a, b) => b.timestamp - a.timestamp).forEach(rec => {
      const div = document.createElement('div');
      div.className = 'record-item';
      div.innerHTML = `<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;"><strong>${esc(rec.student)}</strong><span class="badge ${getTypeClass(rec.type)}">${esc(rec.type)}</span>${rec.note ? `<span style="font-size:0.85rem;color:#425673;">📌 ${esc(rec.note)}</span>` : ''}</div><button class="delete-btn">✕</button>`;
      div.querySelector('.delete-btn').addEventListener('click', () => deleteRecord(rec));
      c.appendChild(div);
    });
    document.getElementById('recordCount').textContent = `${today.length}条`;
    const w = getWeekRecords();
    document.getElementById('summaryText') && (document.getElementById('summaryText').textContent = `📊 请假${w.filter(r => r.type === '请假').length} · 缺7节${w.filter(r => r.type === '未上第7节托管').length} · 缺8节${w.filter(r => r.type === '未上第8节托管').length} · 停餐${w.filter(r => ['已停餐', '未停餐', '补停餐'].includes(r.type)).length}`);
  }

  function esc(t) { return String(t).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

  function downloadCSV(arr, suffix = '') {
    if (!arr.length) return alert('无记录');
    const s = [...arr].sort((a, b) => a.date.localeCompare(b.date) || a.student.localeCompare(b.student));
    let csv = "日期,学生,事件类型,重大事项\n";
    s.forEach(r => csv += `${r.date},${r.student},${r.type},"${r.note || ''}"\n`);
    const b = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(b);
    a.download = `记录${suffix}_${new Date().toISOString().slice(0, 10)}.csv`;
    a.click();
  }

  // ============ 历史筛选 ============
  function getFilteredRecords() {
    const sd = document.getElementById('filterStartDate').value, ed = document.getElementById('filterEndDate').value;
    const stu = document.getElementById('filterStudent').value, ty = document.getElementById('filterType').value;
    const kw = document.getElementById('filterKeyword').value.trim().toLowerCase();
    return records.filter(r => {
      if (sd && r.date < sd) return false;
      if (ed && r.date > ed) return false;
      if (stu && r.student !== stu) return false;
      if (ty === '有备注') { if (!r.note || !r.note.trim()) return false; }
      else if (ty && r.type !== ty) return false;
      if (kw) { if (!(r.student + r.type + (r.note || '') + r.date).toLowerCase().includes(kw)) return false; }
      return true;
    });
  }

  function renderFilteredRecords() {
    const filtered = getFilteredRecords(), c = document.getElementById('filteredRecordsContainer');
    document.getElementById('filteredCount').textContent = `${filtered.length}条结果`;
    if (!filtered.length) { c.innerHTML = '<div class="empty-message">📭 没有匹配的记录</div>'; return; }
    const s = [...filtered].sort((a, b) => b.date.localeCompare(a.date) || b.timestamp - a.timestamp);
    c.innerHTML = '';
    s.forEach(rec => {
      const div = document.createElement('div');
      div.className = 'record-item';
      div.innerHTML = `<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;"><span style="color:#8899b0;font-size:0.8rem;">📅${rec.date}</span><strong>${esc(rec.student)}</strong><span class="badge ${getTypeClass(rec.type)}">${esc(rec.type)}</span>${rec.note ? `<span style="font-size:0.85rem;color:#425673;">📌 ${esc(rec.note)}</span>` : ''}</div><button class="delete-btn">✕</button>`;
      div.querySelector('.delete-btn').addEventListener('click', () => { deleteRecord(rec); renderFilteredRecords(); });
      c.appendChild(div);
    });
  }

  function applyFilter() {
    if (!document.getElementById('filterStartDate').value && !document.getElementById('filterEndDate').value && records.length > 0) {
      const latest = records.reduce((max, r) => r.date > max ? r.date : max, '2000-01-01');
      document.getElementById('filterEndDate').value = latest;
      const d = new Date(latest);
      d.setDate(d.getDate() - 30);
      document.getElementById('filterStartDate').value = d.toISOString().slice(0, 10);
    }
    renderFilteredRecords();
  }

  function resetFilter() {
    document.getElementById('filterStartDate').value = '';
    document.getElementById('filterEndDate').value = '';
    document.getElementById('filterStudent').value = '';
    document.getElementById('filterType').value = '';
    document.getElementById('filterKeyword').value = '';
    document.getElementById('filteredRecordsContainer').innerHTML = '<div class="empty-message">点击「🔍 筛选」查看历史记录</div>';
    document.getElementById('filteredCount').textContent = '0条结果';
  }

  // ============ 评定 ============
  function computeAttendanceStats(s, st, en) { const f = records.filter(r => r.student === s && r.date >= st && r.date <= en); return { leave: f.filter(r => r.type === '请假').length, absent: f.filter(r => r.type.includes('托管')).length }; }
  function autoAttendanceGrade(c) { if (c === 0) return 'A'; if (c === 1) return 'B'; if (c === 2) return 'C'; return 'D'; }
  function getAssessmentVal(s, st, en, dk) { const k = `${s}|${st}|${en}|${dk}`; if (assessments[k]) return assessments[k]; if (dk === 'attendance_leave') return autoAttendanceGrade(computeAttendanceStats(s, st, en).leave); if (dk === 'attendance_absent') return autoAttendanceGrade(computeAttendanceStats(s, st, en).absent); return 'B'; }
  function getOverallGrade(s, st, en) { const o = { A: 1, B: 2, C: 3, D: 4 }; let w = 'A'; DIMENSIONS.forEach(d => { const g = getAssessmentVal(s, st, en, d.key); if (o[g] > o[w]) w = g; }); return w; }
  function getGradeClass(g) { return { A: 'grade-select A', B: 'grade-select B', C: 'grade-select C', D: 'grade-select D' }[g] || 'grade-select'; }

  function renderAssessmentTable() {
    const { start, end } = getAssessmentRange(), b = document.getElementById('assessmentBody');
    if (!start || !end) { b.innerHTML = '<tr><td colspan="12" class="empty-message">请选择评定周期</td></tr>'; return; }
    if (!studentList.length) { b.innerHTML = '<tr><td colspan="12" class="empty-message">暂无学生</td></tr>'; return; }
    b.innerHTML = '';
    studentList.forEach(s => {
      const ov = getOverallGrade(s, start, end), tr = document.createElement('tr');
      const ms = (dk) => { const v = getAssessmentVal(s, start, end, dk); let o = ''; ['A', 'B', 'C', 'D'].forEach(g => { o += `<option value="${g}" ${v === g ? 'selected' : ''}>${g === 'A' ? 'A优秀' : g === 'B' ? 'B良好' : g === 'C' ? 'C一般' : 'D努力'}</option>`; }); return `<select class="${getGradeClass(v)} assessment-dim" data-student="${esc(s)}" data-start="${start}" data-end="${end}" data-dim="${dk}">${o}</select>`; };
      tr.innerHTML = `<td class="name-col">${esc(s)}</td>${DIMENSIONS.map(d => `<td>${ms(d.key)}</td>`).join('')}<td><span class="total-grade ${ov}">${ov}</span></td>`;
      tr.querySelectorAll('.assessment-dim').forEach(sel => { sel.addEventListener('change', function () { assessments[`${this.dataset.student}|${this.dataset.start}|${this.dataset.end}|${this.dataset.dim}`] = this.value; markChanged(); this.className = getGradeClass(this.value) + ' assessment-dim'; const no = getOverallGrade(this.dataset.student, this.dataset.start, this.dataset.end); tr.querySelector('.total-grade').textContent = no; tr.querySelector('.total-grade').className = `total-grade ${no}`; saveToLocal(); }); });
      b.appendChild(tr);
    });
  }

  function autoGradeAll() { const { start, end } = getAssessmentRange(); if (!start || !end) return alert('请选择周期'); if (!studentList.length) return alert('无学生'); studentList.forEach(s => { const st = computeAttendanceStats(s, start, end); DIMENSIONS.forEach(d => { const k = `${s}|${start}|${end}|${d.key}`; if (d.key === 'attendance_leave') assessments[k] = autoAttendanceGrade(st.leave); else if (d.key === 'attendance_absent') assessments[k] = autoAttendanceGrade(st.absent); else if (!assessments[k]) assessments[k] = 'B'; }); }); markChanged(); renderAssessmentTable(); saveToLocal(); showToast('🤖 完成'); }

  function resetAllAssessments() { const { start, end } = getAssessmentRange(); if (!start || !end) return alert('请选择周期'); if (!confirm('清空评定？')) return; studentList.forEach(s => { DIMENSIONS.forEach(d => { delete assessments[`${s}|${start}|${end}|${d.key}`]; }); }); markChanged(); renderAssessmentTable(); saveToLocal(); showToast('🔄 已重置'); }

  function exportAssessment() { const { start, end } = getAssessmentRange(); if (!start || !end) return alert('请选择周期'); if (!studentList.length) return alert('无学生'); let csv = `学生,${DIMENSIONS.map(d => d.label).join(',')},综合等级\n`; studentList.forEach(s => { csv += `${s},${DIMENSIONS.map(d => getAssessmentVal(s, start, end, d.key)).join(',')},${getOverallGrade(s, start, end)}\n`; }); const b = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' }); const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = `素质评定_${start}_${end}.csv`; a.click(); }

  // ============ 标签切换 ============
  document.querySelectorAll('.tab-btn').forEach(btn => { btn.addEventListener('click', () => { document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active')); btn.classList.add('active'); document.getElementById('tab-' + btn.dataset.tab).classList.add('active'); if (btn.dataset.tab === 'assessment') renderAssessmentTable(); }); });

  // ============ 初始化 ============
  loadFromLocal();
  currentDate = new Date().toISOString().slice(0, 10);
  document.getElementById('recordDate').value = currentDate;
  document.getElementById('assessmentEnd').value = currentDate;
  document.getElementById('assessmentStart').value = getMonday(currentDate);
  if (!studentList.length) { studentList = ['陈小星', '张子涵', '李雨桐', '王浩然', '刘一诺']; saveToLocal(); }
  updateAllUI();
  renderTodayUI();
  renderDrafts();

  // ============ 事件绑定 ============
  document.getElementById('recordDate').addEventListener('change', e => { currentDate = e.target.value || new Date().toISOString().slice(0, 10); renderTodayUI(); });
  document.getElementById('addRecordBtn').addEventListener('click', addRecord);
  document.getElementById('selectAllStudents').addEventListener('click', () => document.querySelectorAll('.student-check').forEach(cb => cb.checked = true));
  document.getElementById('deselectAllStudents').addEventListener('click', () => document.querySelectorAll('.student-check').forEach(cb => cb.checked = false));
  document.getElementById('batchAddBtn').addEventListener('click', () => { const t = document.getElementById('batchInput').value.trim(); if (!t) return alert('粘贴姓名'); const n = parseStudentNames(t); if (!n.length) return alert('未识别'); const r = addStudents(n, false); document.getElementById('batchInput').value = ''; saveToLocal(); showToast(`✅ 新增${r.added}人，共${r.total}人`); });
  document.getElementById('batchReplaceBtn').addEventListener('click', () => { const t = document.getElementById('batchInput').value.trim(); if (!t) return alert('粘贴姓名'); if (!confirm('替换全部？')) return; const n = parseStudentNames(t); if (!n.length) return alert('未识别'); const r = addStudents(n, true); document.getElementById('batchInput').value = ''; saveToLocal(); showToast(`🔄 共${r.total}人`); });
  document.getElementById('addSingleBtn').addEventListener('click', () => { const i = document.getElementById('singleStudentInput'); const n = i.value.trim(); if (!n) return alert('输入姓名'); if (n.length > 30) return alert('过长'); if (studentList.includes(n)) { i.value = ''; return alert('已存在'); } studentList.push(n); markChanged(); saveToLocal(); updateAllUI(); i.value = ''; i.focus(); });
  document.getElementById('singleStudentInput').addEventListener('keypress', e => { if (e.key === 'Enter') { e.preventDefault(); document.getElementById('addSingleBtn').click(); } });
  document.getElementById('clearStudentBtn').addEventListener('click', () => { clearAllStudents(); saveToLocal(); });
  document.getElementById('exportStudentBtn').addEventListener('click', () => { if (!studentList.length) return alert('空'); const b = new Blob(['\uFEFF' + studentList.join('\n')], { type: 'text/plain;charset=utf-8' }); const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = `学生名单_${new Date().toISOString().slice(0, 10)}.txt`; a.click(); });
  document.getElementById('saveDraftBtn').addEventListener('click', saveDraft);
  document.getElementById('submitAllDraftsBtn').addEventListener('click', submitAllDrafts);
  document.getElementById('clearDraftsBtn').addEventListener('click', clearDrafts);
  document.getElementById('exportByTypeBtn').addEventListener('click', () => { const t = document.getElementById('exportTypeSelect').value; const a = getAllRecords(); const m = { '全部': a, '请假': a.filter(r => r.type === '请假'), '未上第7节托管': a.filter(r => r.type === '未上第7节托管'), '未上第8节托管': a.filter(r => r.type === '未上第8节托管'), '已停餐': a.filter(r => r.type === '已停餐'), '未停餐': a.filter(r => r.type === '未停餐'), '补停餐': a.filter(r => r.type === '补停餐'), '停餐类': a.filter(r => ['已停餐', '未停餐', '补停餐'].includes(r.type)), '托管类': a.filter(r => ['未上第7节托管', '未上第8节托管'].includes(r.type)), '重大事件': a.filter(r => r.note && r.note.trim().length > 0) }; downloadCSV(m[t] || a, '_' + t); });
  document.getElementById('manualSaveBtn').addEventListener('click', () => { saveToLocal(); showToast('✅ 数据已保存！'); });
  document.getElementById('manualBackupBtn').addEventListener('click', () => downloadBackup());
  document.getElementById('restoreFile').addEventListener('change', function () { if (this.files[0]) { restoreBackup(this.files[0]); this.value = ''; } });

  // CSV导入
  document.getElementById('importCsvFile').addEventListener('change', function () { if (this.files[0]) { importCSVRecords(this.files[0]); this.value = ''; } });

  // 历史筛选
  document.getElementById('applyFilterBtn').addEventListener('click', applyFilter);
  document.getElementById('resetFilterBtn').addEventListener('click', resetFilter);
  document.getElementById('exportFilteredBtn').addEventListener('click', () => { const f = getFilteredRecords(); if (!f.length) return alert('无结果'); downloadCSV(f, '_筛选结果'); });

  // 评定
  document.getElementById('assessmentPeriod').addEventListener('change', function () { const c = this.value === 'custom'; document.getElementById('assessmentStart').style.display = c ? 'inline' : 'none'; document.getElementById('assessmentEnd').style.display = c ? 'inline' : 'none'; document.getElementById('customSep').style.display = c ? 'inline' : 'none'; if (!c) renderAssessmentTable(); });
  document.getElementById('refreshAssessment').addEventListener('click', renderAssessmentTable);
  document.getElementById('autoGradeBtn').addEventListener('click', autoGradeAll);
  document.getElementById('resetAllBtn').addEventListener('click', resetAllAssessments);
  document.getElementById('exportAssessmentBtn').addEventListener('click', exportAssessment);

  saveToLocal();
})();
</script>
</body>
</html>
